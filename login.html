<!DOCTYPE>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>Login</title>

</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h1>💳 Kirsov</h1>

        <p>Payment tracking made simple</p>

        <form method="post">

            <input 
            type="text" 
            name="username"
            placeholder="Username">


            <input 
            type="password"
            name="password"
            placeholder="Password">


            <button type="submit">
                Login
            </button>

        </form>


        <a href="/register">
            <button class="create-btn">
                Create Account
            </button>
        </a>

    </div>

</div>

</body>
</html>
